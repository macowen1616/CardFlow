<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CardFlow | Add Cards</title>
<link rel="stylesheet" href="./css/styles.css">
</head>

<body class="neon-street">

<div class="bg-effects"></div>

<header class="topbar">

<div class="brand">
<div class="logo">
<img src="./images/cardflow%20logo.jpeg" alt="CardFlow logo">
</div>
<span class="brand-name">CardFlow</span>
</div>

<nav class="nav">
<a class="nav-link" href="./index.html">Home</a>
<a class="nav-link active" href="./add-card.html">Add Cards</a>
<a class="nav-link" href="./binders.html">Binders</a>
</nav>

</header>

<main class="page glass-panel">

<h1 class="page-title">Add Cards</h1>

<form id="cardForm" class="form">

<div class="form-grid">

<label class="field">
<span>Card Name *</span>
<input name="name" type="text" required minlength="2" placeholder="Charizard">
</label>

<label class="field">
<span>Series *</span>
<select name="series" required>
<option disabled selected value="">Select series</option>
<option>Scarlet & Violet</option>
<option>Sword & Shield</option>
<option>Sun & Moon</option>
<option>XY</option>
<option>Black & White</option>
</select>
</label>

<label class="field">
<span>Series Expansion *</span>
<input name="expansion" type="text" required placeholder="151">
</label>

<label class="field">
<span>Rarity *</span>
<select name="rarity" required>
<option disabled selected value="">Select</option>
<option>Common</option>
<option>Uncommon</option>
<option>Rare</option>
<option>Holo Rare</option>
<option>Illustration Rare</option>
<option>Ultra Rare</option>
<option>Secret Rare</option>
</select>
</label>

<label class="field">
<span>Card Number *</span>
<input name="number" required placeholder="151">
</label>

<label class="field">
<span>Quantity</span>
<input name="qty" type="number" value="1">
</label>

<label class="field">
<span>Select Binder *</span>
<select id="binderSelect" required>
<option disabled selected value="">Select Binder</option>
</select>
</label>

</div>

<div class="form-actions">

<button class="btn primary" type="submit">
Add To Binder
</button>

</div>

<p id="status"></p>

</form>

</main>

<script src="./js/add.js"></script>

</body>
</html>
